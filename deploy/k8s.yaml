apiVersion: apps/v1
kind: Deployment
metadata: { name: breachwatch, labels: { app: breachwatch } }
spec:
  replicas: 1
  selector: { matchLabels: { app: breachwatch } }
  template:
    metadata: { labels: { app: breachwatch } }
    spec:
      containers:
        - name: breachwatch
          image: ghcr.io/cognis-digital/breachwatch:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: breachwatch }
spec:
  selector: { app: breachwatch }
  ports: [{ port: 80, targetPort: 8000 }]
